<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoY Charts — US Macro Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .nav-links { display: flex; gap: 1rem; }
  .nav-link {
    padding: .4rem 1rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: .85rem;
    text-decoration: none; transition: all .2s;
  }
  .nav-link:hover, .nav-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  main { padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
    margin-bottom: 1.5rem; padding: 1rem 1.25rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .controls label { font-size: .8rem; color: var(--muted); margin-right: .25rem; }
  .cat-nav { display: flex; flex-wrap: wrap; gap: .5rem; flex: 1; }
  .cat-btn {
    padding: .35rem .9rem; border-radius: 9999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .2s;
  }
  .cat-btn:hover, .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .mode-toggle { display: flex; gap: .5rem; }
  .mode-btn {
    padding: .35rem .9rem; border-radius: 9999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .2s;
  }
  .mode-btn.active { background: var(--yellow); color: #000; border-color: var(--yellow); }

  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: 1rem; padding: 4rem; color: var(--muted);
  }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cat-section { margin-bottom: 2.5rem; }
  .cat-header {
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border);
  }
  .cat-header h2 { font-size: 1.05rem; font-weight: 600; }
  .cat-badge { background: var(--surface); color: var(--muted); font-size: .7rem;
    padding: 2px 8px; border-radius: 9999px; border: 1px solid var(--border); }

  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1.25rem; }

  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; position: relative; overflow: hidden;
  }
  .chart-card .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

  .chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .25rem; }
  .chart-name { font-size: .9rem; font-weight: 600; }
  .chart-latest { font-size: 1.1rem; font-weight: 700; }

  .chart-meta { display: flex; gap: 1rem; margin-bottom: .75rem; }
  .chart-yoy { font-size: .78rem; font-weight: 600; }
  .chart-yoy.up { color: var(--green); }
  .chart-yoy.down { color: var(--red); }
  .chart-yoy.neutral { color: var(--muted); }
  .chart-desc { font-size: .72rem; color: var(--muted); }

  .chart-canvas-wrap { height: 180px; position: relative; }

  .combo-section { margin-bottom: 2.5rem; }
  .combo-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem;
  }
  .combo-header { font-size: 1rem; font-weight: 600; margin-bottom: .75rem; }
  .combo-canvas-wrap { height: 260px; position: relative; }
  .combo-legend { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem; }
  .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 768px) {
    header { padding: 1rem; flex-direction: column; align-items: flex-start; }
    main { padding: 1rem; }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📈 US Macro <span>YoY Charts</span></h1>
    <div style="font-size:.75rem;color:var(--muted);margin-top:.2rem">Year-over-Year % change · Last 5 quarters of context</div>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">← Dashboard</a>
    <a href="/charts/" class="nav-link active">📈 Charts</a>
  </div>
</header>

<main>
  <div class="controls">
    <div>
      <label>Category:</label>
      <div class="cat-nav" id="cat-nav">
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="GDP & Output">📊 GDP & Output</button>
        <button class="cat-btn" data-cat="Inflation">🔥 Inflation</button>
        <button class="cat-btn" data-cat="Labor Market">👷 Labor Market</button>
        <button class="cat-btn" data-cat="Sentiment">💬 Sentiment</button>
        <button class="cat-btn" data-cat="Monetary Policy">🏦 Monetary Policy</button>
        <button class="cat-btn" data-cat="Financial Conditions">📈 Financial Conditions</button>
        <button class="cat-btn" data-cat="International Trade">🌐 International Trade</button>
        <button class="cat-btn" data-cat="Housing">🏠 Housing</button>
      </div>
    </div>
    <div>
      <label>View:</label>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-individual" onclick="setMode('individual')">Individual</button>
        <button class="mode-btn" id="mode-overlay" onclick="setMode('overlay')">Overlay by Category</button>
      </div>
    </div>
  </div>

  <div id="loading" class="loading"><div class="spinner"></div> Loading FRED data…</div>
  <div id="charts-container" style="display:none"></div>
</main>

<script>
let allData = {};
let chartInstances = {};
let currentMode = 'individual';
let currentCat = 'all';

const CATEGORIES = ["GDP & Output","Inflation","Labor Market","Sentiment","Monetary Policy","Financial Conditions","International Trade","Housing"];

async function loadData() {
  try {
    const resp = await fetch('/api/summary/');
    const json = await resp.json();
    if (json.status !== 'ok') throw new Error(json.message);
    allData = json.data;
    render();
  } catch(err) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red)">❌ ${err.message}</div>`;
  }
}

function render() {
  destroyAll();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('charts-container').style.display = 'block';
  if (currentMode === 'individual') renderIndividual();
  else renderOverlay();
}

function renderIndividual() {
  const container = document.getElementById('charts-container');
  container.innerHTML = '';

  const byCategory = {};
  Object.entries(allData).forEach(([sid, s]) => {
    const cat = s.category;
    if (currentCat !== 'all' && cat !== currentCat) return;
    byCategory[cat] = byCategory[cat] || [];
    byCategory[cat].push({ sid, ...s });
  });

  const orderedCats = CATEGORIES.filter(c => byCategory[c]);
  orderedCats.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.dataset.cat = cat;
    section.innerHTML = `
      <div class="cat-header">
        <h2>${categoryEmoji(cat)} ${cat}</h2>
        <span class="cat-badge">${byCategory[cat].length} series</span>
      </div>
      <div class="charts-grid" id="grid-${slugify(cat)}"></div>
    `;
    container.appendChild(section);

    const grid = section.querySelector('.charts-grid');
    byCategory[cat].forEach(s => {
      const card = buildChartCard(s);
      grid.appendChild(card);
    });
  });

  setTimeout(() => {
    Object.entries(allData).forEach(([sid, s]) => {
      if (currentCat !== 'all' && s.category !== currentCat) return;
      renderIndividualChart(sid, s);
    });
  }, 100);
}

function buildChartCard(s) {
  const card = document.createElement('div');
  card.className = 'chart-card';

  const yoy = s.yoy_pct;
  const yoyClass = yoy == null ? 'neutral' : yoy > 0.1 ? 'up' : yoy < -0.1 ? 'down' : 'neutral';
  const yoyStr = yoy != null ? `${yoy >= 0 ? '+' : ''}${yoy.toFixed(2)}% YoY` : 'N/A YoY';
  const latestStr = formatValue(s.latest_value, s.prefix, s.suffix);

  card.innerHTML = `
    <div class="accent-bar" style="background:${s.color}"></div>
    <div class="chart-header">
      <div class="chart-name">${s.name}</div>
      <div class="chart-latest" style="color:${s.color}">${latestStr}</div>
    </div>
    <div class="chart-meta">
      <span class="chart-yoy ${yoyClass}">${yoyClass === 'up' ? '▲' : yoyClass === 'down' ? '▼' : '—'} ${yoyStr}</span>
      <span class="chart-desc">${s.units}</span>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="chart-${s.sid}"></canvas>
    </div>
  `;
  return card;
}

function renderIndividualChart(sid, s) {
  const canvas = document.getElementById(`chart-${sid}`);
  if (!canvas) return;

  const obs = (s.observations || []).filter(o => o.value != null);
  if (obs.length < 2) return;

  const labels = obs.map(o => formatDate(o.date));
  const values = obs.map(o => o.value);
  const color = s.color || '#3b82f6';

  const ctx = canvas.getContext('2d');
  chartInstances[sid] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: s.name,
        data: values,
        borderColor: color,
        borderWidth: 2,
        pointRadius: obs.length > 20 ? 2 : 4,
        pointHoverRadius: 6,
        fill: true,
        backgroundColor: hexAlpha(color, 0.1),
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${s.prefix || ''}${ctx.raw.toLocaleString()}${s.suffix || ''}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#94a3b8', maxTicksLimit: 6, font: { size: 10 } },
          grid: { color: '#1e293b' }
        },
        y: {
          ticks: { color: '#94a3b8', font: { size: 10 } },
          grid: { color: '#334155' }
        }
      }
    }
  });
}

function renderOverlay() {
  const container = document.getElementById('charts-container');
  container.innerHTML = '';

  const cats = currentCat === 'all' ? CATEGORIES : [currentCat];

  cats.forEach(cat => {
    const series = Object.entries(allData)
      .filter(([_, s]) => s.category === cat)
      .map(([sid, s]) => ({ sid, ...s }));
    if (!series.length) return;

    const section = document.createElement('div');
    section.className = 'combo-section';
    section.dataset.cat = cat;

    const legendHTML = series.map(s =>
      `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${s.name}</div>`
    ).join('');

    section.innerHTML = `
      <div class="combo-card">
        <div class="combo-header">${categoryEmoji(cat)} ${cat} — All Series</div>
        <div class="combo-canvas-wrap"><canvas id="combo-${slugify(cat)}"></canvas></div>
        <div class="combo-legend">${legendHTML}</div>
      </div>
    `;
    container.appendChild(section);
  });

  setTimeout(() => {
    cats.forEach(cat => {
      const series = Object.entries(allData)
        .filter(([_, s]) => s.category === cat)
        .map(([sid, s]) => ({ sid, ...s }));
      if (!series.length) return;
      renderComboChart(cat, series);
    });
  }, 100);
}

function renderComboChart(cat, seriesList) {
  const canvas = document.getElementById(`combo-${slugify(cat)}`);
  if (!canvas) return;

  const longest = seriesList.reduce((a, b) =>
    (b.observations || []).length > (a.observations || []).length ? b : a
  );
  const labels = (longest.observations || []).map(o => formatDate(o.date));

  const datasets = seriesList.map(s => {
    const obs = (s.observations || []).filter(o => o.value != null);
    return {
      label: s.name,
      data: obs.map(o => o.value),
      borderColor: s.color,
      borderWidth: 2,
      pointRadius: 2,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.4,
    };
  });

  const ctx = canvas.getContext('2d');
  chartInstances[`combo-${slugify(cat)}`] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.raw?.toLocaleString()}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1e293b' } },
        y: {
          ticks: { color: '#94a3b8', font: { size: 10 } },
          grid: { color: '#334155' }
        }
      }
    }
  });
}

document.getElementById('cat-nav').addEventListener('click', e => {
  if (!e.target.classList.contains('cat-btn')) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  render();
});

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-individual').classList.toggle('active', mode === 'individual');
  document.getElementById('mode-overlay').classList.toggle('active', mode === 'overlay');
  render();
}

function destroyAll() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

function formatValue(val, prefix, suffix) {
  if (val == null) return 'N/A';
  const abs = Math.abs(val);
  let str;
  if (abs >= 1000) str = val.toLocaleString('en-US', { maximumFractionDigits: 0 });
  else if (abs >= 10) str = val.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  else str = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return `${prefix || ''}${str}${suffix || ''}`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function slugify(str) { return str.toLowerCase().replace(/[^a-z0-9]/g, '-'); }

function categoryEmoji(cat) {
  const map = {
    'GDP & Output':'📊','Inflation':'🔥','Labor Market':'👷',
    'Sentiment':'💬','Monetary Policy':'🏦','Financial Conditions':'📈',
    'International Trade':'🌐','Housing':'🏠',
  };
  return map[cat] || '📌';
}

loadData();
</script>
</body>
</html>
